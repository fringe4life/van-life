name: React Doctor

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: millionco/react-doctor@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          diff: main
