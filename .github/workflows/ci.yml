name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Default: least privilege. Jobs that need more declare their own permissions.
permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Loads committed .env.test via Varlock (no Bitwarden init)
    env:
      VARLOCK_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ultracite check
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  # Real Bitwarden resolve — master push only (not PR).
  # VARLOCK_ENV=development enables .env.bitwarden import.
  varlock:
    name: Varlock
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Load and validate env (Varlock)
        uses: dmno-dev/varlock-action@7141115d0060616e398c5fa9035e67d7820ab2b6 # v1.0.5
        env:
          VARLOCK_ENV: development
          BITWARDEN_ACCESS_TOKEN: ${{ secrets.BITWARDEN_ACCESS_TOKEN }}

  react-doctor:
    name: React Doctor
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: React Doctor
        uses: millionco/react-doctor@938008119a288f2fb47c66a69cd9279a21f31784 # v2
        with:
          scope: changed
          blocking: warning

  # Soft gate: rules mostly warn + fail-on-issues false until cleanup settles.
  fallow:
    name: Fallow
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Fallow audit
        uses: fallow-rs/fallow@32b3f89fe28c286c85a6b0aed4ec5be120f54da6 # v3.6.0
        with:
          command: audit
          version: "3.6.0"
          score: true
          comment: true
          review-comments: true
          fail-on-issues: false
          gate: new-only

      - name: Fallow security
        uses: fallow-rs/fallow@32b3f89fe28c286c85a6b0aed4ec5be120f54da6 # v3.6.0
        with:
          command: security
          version: "3.6.0"
          fail-on-issues: false

  fallow-badge:
    name: Fallow badge
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate health badge
        run: bun run fallow:badge

      - name: Upload badge artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: fallow-health-badge
          path: .github/badges/health.svg
          if-no-files-found: error
          retention-days: 90

      # No direct push to master — opens/updates a PR when the SVG changes.
      - name: Propose badge update
        uses: peter-evans/create-pull-request@84ae59a2cdc2258d6fa0732dd66352dddae2a412 # v7.0.9
        with:
          branch: chore/fallow-health-badge
          commit-message: chore: update fallow health badge
          title: chore: update fallow health badge
          body: |
            Automated fallow health badge refresh from CI on `master`.

            Merge to update the README badge (`.github/badges/health.svg`).
          add-paths: |
            .github/badges/health.svg
          delete-branch: true
